# @file        project.yml
# @description XcodeGen spec for SpectArk — a non-sandboxed Developer ID macOS backup app. Builds the
#              app as SpectArk (PRODUCT_NAME); the Xcode project/scheme keep the legacy SpectaBackup
#              name and the bundle id stays ai.calidalab.spectabackup so existing backups/Keychain/FDA
#              keep working. Generates SpectaBackup.xcodeproj. Run `xcodegen generate` after editing.
# @author      Kennt Kim
# @company     Calida Lab
# @created     2026-06-29
# @lastUpdated 2026-06-30

name: SpectaBackup
options:
  bundleIdPrefix: ai.calidalab
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.1.2"
    CURRENT_PROJECT_VERSION: "4"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "8677QL77VJ"
    ENABLE_HARDENED_RUNTIME: YES

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  SpectaBackup:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: SpectaBackup
    dependencies:
      - sdk: libsqlite3.tbd
      - package: Sparkle
    scheme:
      testTargets:
        - SpectaBackupTests   # so `xcodebuild test -scheme SpectaBackup` always has a test action
    settings:
      base:
        PRODUCT_NAME: SpectArk
        # Keep the Swift module name as the legacy internal name (the rename is display-only): source
        # and tests use `import SpectaBackup`, and it's decoupled from the user-facing PRODUCT_NAME.
        PRODUCT_MODULE_NAME: SpectaBackup
        PRODUCT_BUNDLE_IDENTIFIER: ai.calidalab.spectabackup
        INFOPLIST_FILE: SpectaBackup/App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_OBJC_BRIDGING_HEADER: SpectaBackup/Services/Infra/Infra-Bridging.h
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/SpectaBackup/Services/Infra/Argon2"
        CODE_SIGN_ENTITLEMENTS: SpectaBackup/App/SpectaBackup.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

  SpectaBackupTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: SpectaBackupTests
    dependencies:
      - target: SpectaBackup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.calidalab.spectabackup.tests
        GENERATE_INFOPLIST_FILE: YES
        # The host app's PRODUCT_NAME is SpectArk (target is still named SpectaBackup), so point the
        # test host at the real product, not the target-name-derived SpectaBackup.app.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SpectArk.app/Contents/MacOS/SpectArk"
        BUNDLE_LOADER: "$(TEST_HOST)"
